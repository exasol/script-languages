build_steps:
- name: build_deps
  phases:
    - name: install_conda_packages
      conda:
        channels:
          - conda-forge
        packages:
          - name: protobuf
            version: =6.31.1
          - name: pcre
            version: '=8.45'
          - name: bazel
            version: =8.3.1
          - name: make
            version: =4.4.1
          - name: chrpath
            version: '=0.16'
          - name: gxx
            version: =15.1.0
          - name: gcc
            version: =15.1.0
            binary: Mamba
      variables:
        PROTOBUF_BIN: '$MAMBA_ROOT_PREFIX/bin/protoc'
        LD_LIBRARY_PATH: '$LD_LIBRARY_PATH:$MAMBA_ROOT_PREFIX/lib/'
        CPLUS_INCLUDE_PATH: '$CPLUS_INCLUDE_PATH:$MAMBA_ROOT_PREFIX/include/'
        C_INCLUDE_PATH: '$C_INCLUDE_PATH:$MAMBA_ROOT_PREFIX/include/'
        SWIG_BUILD_ARCH: "{% if platform == 'x86_64' %}x86_64{% else %}aarch64{% endif %}"
        HOST_PLATFORM: "{% if platform == 'x86_64' %}amd64{% else %}arm64{% endif %}"
        AR: "{% if platform == 'x86_64' %}x86_64{% else %}aarch64{% endif %}-conda-linux-gnu-gcc-ar"
  validation_cfg:
    version_mandatory: true
- name: base_test_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: gdb
        version: 15.0.50.20240403-0ubuntu*
      - name: valgrind
        version: 1:3.22.0-0ubuntu*
      - name: gdbserver
        version: 15.0.50.20240403-0ubuntu*
      - name: binutils
        version: 2.42-4ubuntu*
      - name: patchelf
        version: 0.18.0-1.1build1
      - name: strace
        version: 6.8-0ubuntu*
  validation_cfg:
    version_mandatory: true
- name: security_scan
  phases:
  - name: install_deps
    apt:
      packages:
        - name: gnupg
  - name: install_trivy
    apt:
      repos:
        trivy:
          key_url: https://aquasecurity.github.io/trivy-repo/deb/public.key
          entry: deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb
            generic main
          out_file: trivy.list
      packages:
        - name: trivy
  validation_cfg:
    version_mandatory: false
version: 1.0.0
