build_steps:
- name: base_test_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: gdb
        version: 12.1-0ubuntu1~22.04.2
      - name: valgrind
        version: 1:3.18.1-1ubuntu2
      - name: gdbserver
        version: 12.1-0ubuntu1~22.04.2
      - name: binutils
        version: 2.38-4ubuntu2.12
      - name: patchelf
        version: 0.14.3-1
      - name: strace
        version: 5.16-0ubuntu3
  validation_cfg:
    version_mandatory: true
- name: build_deps
  phases:
  - name: install_apt_packages
    apt:
      packages:
      - name: coreutils
        version: 8.32-4.1ubuntu1.2
      - name: locales
        version: 2.35-0ubuntu3.13
      - name: tar
        version: 1.34+dfsg-1ubuntu0.1.22.04.2
      - name: curl
        version: 7.81.0-1ubuntu1.23
      - name: openjdk-11-jdk-headless
        version: 11.0.30+7-1ubuntu1~22.04
      - name: build-essential
        version: 12.9ubuntu3
      - name: libpcre3-dev
        version: 2:8.39-13ubuntu0.22.04.1
      - name: protobuf-compiler
        version: 3.12.4-1ubuntu7.22.04.6
      - name: chrpath
        version: 0.16-2
    variables:
      PROTOBUF_BIN: /usr/bin/protoc
      JAVA_HOME: /usr/lib/jvm/java-1.11.0-openjdk-{% if platform == 'x86_64' %}amd64{% else %}arm64{% endif %}
  - name: install_bazel
    tools:
      bazel:
        version: '8.3.1'
  validation_cfg:
    version_mandatory: true
- name: security_scan
  phases:
  - name: install_deps
    apt:
      packages:
        - name: gnupg
  - name: install_trivy
    apt:
      repos:
        trivy:
          key_url: https://aquasecurity.github.io/trivy-repo/deb/public.key
          entry: deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb
            generic main
          out_file: trivy.list
      packages:
        - name: trivy
  validation_cfg:
    version_mandatory: false
version: 1.0.0
